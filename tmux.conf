# Options to make tmux more pleasant
set -g mouse on
set -g default-terminal "tmux-256color"
set -s escape-time 0
set -g history-limit 30000
set -g base-index 1
setw -g mode-keys vi
set-option -g allow-rename off
set-option -g automatic-rename off
set -g display-panes-time 3000
set -g bell-action none
set -g visual-bell on
# set-option -g detach-on-destroy off

# Splits preserving current path (override defaults to keep path)
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# New window/session preserving current path
bind c new-window -c "#{pane_current_path}"
bind C new-session -c "#{pane_current_path}"

# Copy mode (Escape enters copy-mode, [ and ] keep tmux defaults: copy-mode and paste-buffer)
bind-key Escape copy-mode
bind-key -T copy-mode-vi 'v' send -X begin-selection

# Pane navigation for Ghostty integration (prefix + h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Swap pane: display pane numbers and swap with selection (prefix + W)
bind W display-panes "swap-pane -t '%%'"

# Pane resize for Ghostty integration (prefix + M-h/j/k/l)
bind -r M-h resize-pane -L 2
bind -r M-j resize-pane -D 2
bind -r M-k resize-pane -U 2
bind -r M-l resize-pane -R 2

# Window navigation (p=previous, n=next are tmux defaults)
bind t new-window -c "#{pane_current_path}"
bind C-f command-prompt -p find-session 'switch-client -t %%'

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Window list: show window name (#W) instead of pane title (#T)
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

run ~/.config/tmux/plugins/catppuccin/catppuccin.tmux

# Status bar: windows on the left, session name on the right
set -g status-position top
set -g status-justify left
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"

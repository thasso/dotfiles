# Options to make tmux more pleasant
set -g mouse on
set -g default-terminal "tmux-256color"
set -s escape-time 0
set -g history-limit 30000
set -g base-index 1
setw -g mode-keys vi
set-option -g allow-rename off
set-option -g automatic-rename off
set -g display-panes-time 3000
# set-option -g detach-on-destroy off

# Splits preserving current path (override defaults to keep path)
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# New window/session preserving current path
bind c new-window -c "#{pane_current_path}"
bind C new-session -c "#{pane_current_path}"

# Copy mode (Escape enters copy-mode, [ and ] keep tmux defaults: copy-mode and paste-buffer)
bind-key Escape copy-mode
bind-key -T copy-mode-vi 'v' send -X begin-selection

# Pane navigation (prefix + hjkl or Ctrl+Shift+Arrow without prefix)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -n C-S-Left select-pane -L
bind -n C-S-Down select-pane -D
bind -n C-S-Up select-pane -U
bind -n C-S-Right select-pane -R
bind > swap-pane -D
bind < swap-pane -U
bind W display-panes "swap-pane -t '%%'"

# Pane resizing (C-hjkl = 5 cells, HJKL = 1 cell)
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5
bind -r H resize-pane -L
bind -r J resize-pane -D
bind -r K resize-pane -U
bind -r L resize-pane -R

# Window navigation (p=previous, n=next are tmux defaults)
bind t new-window -c "#{pane_current_path}"
bind C-f command-prompt -p find-session 'switch-client -t %%'

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

run ~/.config/tmux/plugins/catppuccin/catppuccin.tmux

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

run ~/.config/tmux/plugins/tmux-plugins/tmux-cpu/cpu.tmux
run ~/.config/tmux/plugins/tmux-plugins/tmux-battery/battery.tmux
